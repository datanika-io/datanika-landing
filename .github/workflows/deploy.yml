name: Deploy Landing

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-landing
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2  # need previous commit to diff changed files for IndexNow

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        id: install
        run: npm ci

      - name: Build
        id: build
        run: npm run build

      - name: Run tests
        id: test
        run: npm test

      - name: Deploy to Aweb
        id: deploy
        uses: appleboy/ssh-action@v1
        env:
          # Forwarded into the remote build — Astro reads import.meta.env.PUBLIC_*
          # at build time, so this MUST be set before `npm run build` on Aweb.
          # Empty/unset = ConversionCTA falls back to plain <a> and Google Ads
          # attribution silently breaks. Non-optional for the production build.
          PUBLIC_GOOGLE_ADS_CONVERSION_LABEL: ${{ secrets.PUBLIC_GOOGLE_ADS_CONVERSION_LABEL }}
        with:
          host: ${{ secrets.AWEB_HOST }}
          username: root
          key: ${{ secrets.AWEB_SSH_KEY }}
          envs: PUBLIC_GOOGLE_ADS_CONVERSION_LABEL
          script: |
            set -e
            cd /opt/datanika/datanika-landing
            git pull origin main
            npm ci
            export PUBLIC_GOOGLE_ADS_CONVERSION_LABEL
            npm run build
            cp -r dist/* /var/www/datanika.io/
            echo "Landing deploy complete"

      # IndexNow: tell Bing/Yandex/Seznam/DuckDuckGo about changed URLs so they
      # recrawl in minutes instead of days. Non-blocking — failures are logged
      # but don't fail the deploy.
      #
      # Requires the key file at public/${INDEXNOW_KEY}.txt (committed in this
      # repo). Google does NOT participate in IndexNow but gets the same URLs
      # via sitemap + GSC ping.
      - name: Diff changed URLs
        id: diff
        run: |
          # Find added/modified .astro and .md files under src/pages, map to URLs
          CHANGED=$(git diff --name-only --diff-filter=AMR HEAD~1 HEAD -- \
            'src/pages/**/*.astro' 'src/pages/**/*.md' 'src/pages/**/*.mdx' \
            'src/content/**/*.md' 'src/content/**/*.mdx' 2>/dev/null || true)

          if [ -z "$CHANGED" ]; then
            echo "No content changes — skipping IndexNow ping"
            echo "urls=" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Convert file paths to public URLs
          URLS=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            # Skip test fixtures
            case "$file" in
              *test-fixtures*) continue ;;
            esac
            # Strip prefix and extension, normalize index.* to directory
            url=$(echo "$file" \
              | sed -E 's|^src/pages/||; s|^src/content/([^/]+)/|\1/|' \
              | sed -E 's|\.(astro|md|mdx)$||' \
              | sed -E 's|/index$|/|' \
              | sed -E 's|^index$|/|')
            # Ensure leading slash and trailing slash for non-root
            case "$url" in
              /) ;;
              */) ;;
              *) url="/$url/" ;;
            esac
            URLS="${URLS}https://datanika.io${url}\n"
          done <<< "$CHANGED"

          printf "Changed URLs:\n$URLS"
          # Pack into JSON array for the output (comma-separated)
          JSON_URLS=$(printf "$URLS" | awk 'NF' | awk '{printf "\"%s\",", $0}' | sed 's/,$//')
          echo "urls=[$JSON_URLS]" >> $GITHUB_OUTPUT

      - name: Ping IndexNow
        if: steps.diff.outputs.urls != '' && steps.diff.outputs.urls != '[]'
        continue-on-error: true
        run: |
          PAYLOAD=$(cat <<EOF
          {
            "host": "datanika.io",
            "key": "ada326ab97368636daf05cf876c0daed",
            "keyLocation": "https://datanika.io/ada326ab97368636daf05cf876c0daed.txt",
            "urlList": ${{ steps.diff.outputs.urls }}
          }
          EOF
          )
          echo "POSTing to IndexNow:"
          echo "$PAYLOAD"
          curl -sS -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD" \
            -w "\nHTTP %{http_code}\n" || echo "IndexNow ping failed (non-fatal)"

      # Telegram alert on any build-and-deploy failure. Fires on install, build,
      # vitest, or SSH deploy failure — anything that leaves main "merged but
      # unshipped". See landing#140 for the decision record and Infra's
      # constraints. IndexNow is continue-on-error so it never triggers this.
      - name: Telegram alert on failure
        if: failure()
        env:
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          TEST_OUTCOME: ${{ steps.test.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          if [ "$INSTALL_OUTCOME" = "failure" ]; then STEP="Install dependencies"
          elif [ "$BUILD_OUTCOME" = "failure" ]; then STEP="Build"
          elif [ "$TEST_OUTCOME" = "failure" ]; then STEP="Run tests"
          elif [ "$DEPLOY_OUTCOME" = "failure" ]; then STEP="Deploy to Aweb"
          else STEP="unknown (see run URL)"
          fi
          SHORT_SHA=${COMMIT_SHA:0:7}
          FIRST_LINE=$(printf '%s\n' "$COMMIT_MSG" | head -1)
          TEXT=$(printf '\xf0\x9f\x9a\xa8 *Landing deploy failed*\n\n*Step:* `%s`\n*Commit:* `%s`\n*Message:* %s\n*Run:* %s' \
            "$STEP" "$SHORT_SHA" "$FIRST_LINE" "$RUN_URL")
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=1201995" \
            --data-urlencode "text=${TEXT}" \
            --data-urlencode "parse_mode=Markdown"

  # Post-deploy smoke gate. Fails loud if any curated URL 404s, returns an
  # empty body, or serves the wrong content-type/body substring. See
  # plans/growth/SMOKE_URLS.md (Growth-owned SoT) for the curation rationale.
  # Non-empty body check is the critical guard — core#124 returned a
  # 404 Content-Length: 0 that a status-only check would have missed.
  smoke:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    steps:
      - uses: actions/checkout@v6
      - name: Smoke gate — datanika.io
        run: bash .github/smoke-check.sh https://datanika.io .github/smoke-urls-landing.txt
